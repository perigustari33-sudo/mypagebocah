<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Halaman - Celine Bee</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            background: #f0f2f5;
        }

        .container {
            background: white;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        h1 {
            color: #1a1a2e;
            font-size: 28px;
            border-bottom: 4px solid #4CAF50;
            padding-bottom: 15px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subtitle {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .stats {
            background: #e8f5e9;
            padding: 12px 20px;
            border-radius: 10px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }

        .stats span {
            font-weight: bold;
            color: #2e7d32;
        }

        .loading {
            text-align: center;
            padding: 40px 0;
            color: #666;
        }

        .loading::after {
            content: '⏳';
            display: inline-block;
            animation: spin 1s linear infinite;
            margin-left: 8px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #link-list {
            list-style: none;
            padding: 0;
        }

        #link-list li {
            background: #f8f9fa;
            margin: 6px 0;
            padding: 12px 18px;
            border-radius: 8px;
            border-left: 4px solid transparent;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
        }

        #link-list li:hover {
            background: #e8f5e9;
            border-left-color: #4CAF50;
            transform: translateX(6px);
        }

        #link-list li .icon {
            margin-right: 12px;
            font-size: 18px;
            color: #4CAF50;
        }

        #link-list a {
            text-decoration: none;
            color: #1a1a2e;
            font-weight: 500;
            flex: 1;
            word-break: break-all;
        }

        #link-list a:hover {
            color: #4CAF50;
        }

        #link-list .badge {
            background: #ddd;
            font-size: 11px;
            padding: 2px 10px;
            border-radius: 12px;
            color: #555;
            margin-left: 10px;
            white-space: nowrap;
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            color: #999;
            font-size: 13px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .error-msg {
            background: #ffebee;
            color: #c62828;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            h1 {
                font-size: 20px;
            }
            #link-list li {
                padding: 10px 14px;
                flex-wrap: wrap;
            }
            #link-list .badge {
                margin-left: 0;
                margin-top: 5px;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📄 Daftar Semua Halaman</h1>
        <p class="subtitle">Daftar lengkap semua halaman yang tersedia di situs ini</p>

        <div class="stats">
            <span id="total-count">⏳ Memuat...</span>
            <span>🔄 Data dari database</span>
        </div>

        <div id="loading" class="loading">Memuat daftar halaman...</div>

        <ul id="link-list"></ul>

        <div class="footer">
            ⚡ Diperbarui otomatis dari <code>sitemap.xml</code>
        </div>
    </div>

    <script>
        /**
         * Mengambil sitemap.xml, membaca semua URL, dan menampilkannya sebagai daftar link
         */
        async function loadSitemap() {
            const listContainer = document.getElementById('link-list');
            const loadingEl = document.getElementById('loading');
            const totalEl = document.getElementById('total-count');

            try {
                // 1. Ambil file sitemap.xml
                const response = await fetch('/sitemap.xml');

                if (!response.ok) {
                    throw new Error(`Gagal mengambil sitemap.xml (HTTP ${response.status})`);
                }

                const xmlText = await response.text();

                // 2. Parse XML
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(xmlText, 'text/xml');

                // 3. Ambil semua tag <loc>
                const locElements = xmlDoc.getElementsByTagName('loc');
                const urls = [];

                for (let i = 0; i < locElements.length; i++) {
                    const url = locElements[i].textContent.trim();
                    if (url) {
                        urls.push(url);
                    }
                }

                // 4. Hapus loading
                loadingEl.style.display = 'none';

                // 5. Jika tidak ada URL
                if (urls.length === 0) {
                    listContainer.innerHTML =
                        '<li style="text-align:center;color:#999;padding:20px;">Tidak ada halaman ditemukan di sitemap.</li>';
                    totalEl.textContent = '0 halaman';
                    return;
                }

                // 6. Tampilkan total
                totalEl.textContent = `${urls.length} halaman`;

                // 7. Buat daftar link
                urls.forEach((url, index) => {
                    const li = document.createElement('li');

                    // Icon
                    const icon = document.createElement('span');
                    icon.className = 'icon';
                    icon.textContent = '📄';
                    li.appendChild(icon);

                    // Link
                    const a = document.createElement('a');
                    a.href = url;
                    a.textContent = url.replace(/^https?:\/\/[^\/]+/, '');
                    a.target = '_blank';
                    li.appendChild(a);

                    // Badge (nomor urut)
                    const badge = document.createElement('span');
                    badge.className = 'badge';
                    badge.textContent = `#${index + 1}`;
                    li.appendChild(badge);

                    listContainer.appendChild(li);
                });

            } catch (error) {
                // Error handling
                loadingEl.style.display = 'none';
                listContainer.innerHTML = `
                            <li class="error-msg">
                                ❌ ${error.message}
                                <br><br>
                                <small style="display:block;font-weight:normal;">
                                    Pastikan file <code>sitemap.xml</code> ada di root situs.
                                </small>
                            </li>
                        `;
                totalEl.textContent = '⚠️ Gagal memuat';
                console.error('Error loading sitemap:', error);
            }
        }

        // Jalankan fungsi saat halaman selesai dimuat
        document.addEventListener('DOMContentLoaded', loadSitemap);
    </script>

</body>
</html>
