<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deteksi Referer, InApp & WebView</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #777;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .status-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
        }

        .status-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .status-card .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }

        .status-card .label {
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .status-card .value {
            font-size: 14px;
            font-weight: 600;
            margin-top: 8px;
            padding: 5px 10px;
            border-radius: 6px;
            display: inline-block;
        }

        .status-card .value.true {
            background: #d4edda;
            color: #155724;
        }

        .status-card .value.false {
            background: #f8d7da;
            color: #721c24;
        }

        .status-card .detail {
            font-size: 12px;
            color: #555;
            margin-top: 8px;
            word-break: break-all;
            background: white;
            padding: 5px;
            border-radius: 4px;
            border: 1px solid #e9ecef;
        }

        .detail-box {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 20px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        .detail-box h3 {
            color: #333;
            font-size: 16px;
            margin-bottom: 10px;
        }

        .detail-box .info-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #e9ecef;
            font-size: 14px;
        }

        .detail-box .info-row:last-child {
            border-bottom: none;
        }

        .detail-box .info-row .label-info {
            color: #666;
            font-weight: 500;
        }

        .detail-box .info-row .value-info {
            color: #333;
            font-weight: 600;
            text-align: right;
            max-width: 60%;
            word-break: break-all;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 25px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            color: white;
        }

        .btn-primary {
            background: #667eea;
        }

        .btn-primary:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-danger {
            background: #e74c3c;
        }

        .btn-danger:hover {
            background: #c0392b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(231, 76, 60, 0.4);
        }

        .btn-success {
            background: #27ae60;
        }

        .btn-success:hover {
            background: #229954;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(39, 174, 96, 0.4);
        }

        .btn-warning {
            background: #f39c12;
        }

        .btn-warning:hover {
            background: #e67e22;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(243, 156, 18, 0.4);
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #aaa;
            font-size: 12px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .status-grid {
                grid-template-columns: 1fr;
            }

            .container {
                padding: 20px;
            }

            .detail-box .info-row {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }

            .detail-box .info-row .value-info {
                text-align: left;
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔍 Deteksi Browser</h1>
        <p class="subtitle">Referer • InApp Browser • WebView</p>

        <!-- Loading State -->
        <div id="loading" class="loading">
            ⏳ Memuat script deteksi...
        </div>

        <!-- Status Cards -->
        <div class="status-grid" id="statusCards" style="display: none;">
            <div class="status-card">
                <span class="icon">🔗</span>
                <div class="label">Referer</div>
                <div class="value" id="refererStatus">-</div>
                <div class="detail" id="refererDetail">-</div>
            </div>
            <div class="status-card">
                <span class="icon">📱</span>
                <div class="label">InApp Browser</div>
                <div class="value" id="inappStatus">-</div>
                <div class="detail" id="inappDetail">-</div>
            </div>
            <div class="status-card">
                <span class="icon">🌐</span>
                <div class="label">WebView</div>
                <div class="value" id="webviewStatus">-</div>
                <div class="detail" id="webviewDetail">-</div>
            </div>
        </div>

        <!-- Detail Box -->
        <div class="detail-box" id="detailBox" style="display: none;">
            <h3>📋 Informasi Lengkap</h3>
            <div class="info-row">
                <span class="label-info">User Agent</span>
                <span class="value-info" id="userAgent">-</span>
            </div>
            <div class="info-row">
                <span class="label-info">Referer URL</span>
                <span class="value-info" id="refererUrl">-</span>
            </div>
            <div class="info-row">
                <span class="label-info">InApp Name</span>
                <span class="value-info" id="inappName">-</span>
            </div>
            <div class="info-row">
                <span class="label-info">WebView Type</span>
                <span class="value-info" id="webviewType">-</span>
            </div>
            <div class="info-row">
                <span class="label-info">Status</span>
                <span class="value-info" id="statusSummary">-</span>
            </div>
        </div>

        <!-- Buttons -->
        <div class="btn-group" id="buttonGroup" style="display: none;">
            <button class="btn btn-primary" onclick="runDetection()">🔄 Deteksi Ulang</button>
            <button class="btn btn-success" onclick="showAlerts()">🔔 Tampilkan Alert</button>
            <button class="btn btn-warning" onclick="showCustomAlert()">⚡ Alert Kustom</button>
            <button class="btn btn-danger" onclick="clearAll()">🗑️ Reset</button>
        </div>

        <div class="footer">
            <p>Menggunakan external JS: <a href="https://celinebee.cc.cd/deteksi.js" target="_blank">deteksi.js</a></p>
        </div>
    </div>

    <!-- Load External JavaScript -->
    <script src="https://celinebee.cc.cd/deteksi.js"></script>

    <!-- Custom Script untuk Menggunakan External JS -->
    <script>
        // ============================================
        // MENGGUNAKAN FUNGSI DARI EXTERNAL JS
        // ============================================

        // Fungsi untuk update UI menggunakan hasil deteksi dari external JS
        function updateUI() {
            // Gunakan fungsi dari external JS
            const refererResult = detectReferer();
            const inAppResult = detectInApp();
            const webViewResult = detectWebView();

            // Update Referer
            const refererStatus = document.getElementById('refererStatus');
            const refererDetail = document.getElementById('refererDetail');
            if (refererResult.isReferer) {
                refererStatus.textContent = '✅ ADA';
                refererStatus.className = 'value true';
                refererDetail.textContent = refererResult.refererUrl.substring(0, 50) + 
                    (refererResult.refererUrl.length > 50 ? '...' : '');
            } else {
                refererStatus.textContent = '❌ TIDAK ADA';
                refererStatus.className = 'value false';
                refererDetail.textContent = 'Direct Access';
            }

            // Update InApp
            const inappStatus = document.getElementById('inappStatus');
            const inappDetail = document.getElementById('inappDetail');
            if (inAppResult.isInApp) {
                inappStatus.textContent = '✅ TERDETEKSI';
                inappStatus.className = 'value true';
                inappDetail.textContent = inAppResult.appName;
            } else {
                inappStatus.textContent = '❌ TIDAK';
                inappStatus.className = 'value false';
                inappDetail.textContent = 'Browser Normal';
            }

            // Update WebView
            const webviewStatus = document.getElementById('webviewStatus');
            const webviewDetail = document.getElementById('webviewDetail');
            if (webViewResult.isWebView) {
                webviewStatus.textContent = '✅ TERDETEKSI';
                webviewStatus.className = 'value true';
                webviewDetail.textContent = webViewResult.webViewType;
            } else {
                webviewStatus.textContent = '❌ TIDAK';
                webviewStatus.className = 'value false';
                webviewDetail.textContent = 'Browser Normal';
            }

            // Update Detail Box
            document.getElementById('userAgent').textContent = navigator.userAgent || 'Tidak tersedia';
            document.getElementById('refererUrl').textContent = refererResult.refererUrl || 'Tidak ada';
            document.getElementById('inappName').textContent = inAppResult.appName || 'Tidak ada';
            document.getElementById('webviewType').textContent = webViewResult.webViewType || 'Tidak ada';

            // Status Summary
            let statusSummary = '';
            if (refererResult.isReferer) statusSummary += '🔗 Ada Referer ';
            if (inAppResult.isInApp) statusSummary += '📱 InApp ';
            if (webViewResult.isWebView) statusSummary += '🌐 WebView ';
            if (!statusSummary) statusSummary = '✅ Browser Normal (Direct Access)';
            document.getElementById('statusSummary').textContent = statusSummary;

            // Simpan hasil untuk digunakan fungsi lain
            window._detectionResults = {
                referer: refererResult,
                inApp: inAppResult,
                webView: webViewResult
            };

            // Console log
            console.log('========== DETEKSI BROWSER ==========');
            console.log('Referer:', refererResult);
            console.log('InApp:', inAppResult);
            console.log('WebView:', webViewResult);
            console.log('=======================================');

            // Tampilkan elemen yang sebelumnya disembunyikan
            document.getElementById('loading').style.display = 'none';
            document.getElementById('statusCards').style.display = 'grid';
            document.getElementById('detailBox').style.display = 'block';
            document.getElementById('buttonGroup').style.display = 'flex';
        }

        // Fungsi untuk menampilkan alert dari external JS
        function showAlerts() {
            if (typeof window.showDetectionAlerts === 'function') {
                // Gunakan fungsi bawaan dari external JS jika ada
                window.showDetectionAlerts();
            } else {
                // Atau buat manual
                const results = window._detectionResults;
                if (!results) {
                    alert('⚠️ Silakan deteksi terlebih dahulu!');
                    return;
                }

                // Alert Referer
                if (results.referer.isReferer) {
                    alert(`🔗 REFERER DETECTED\n\n${results.referer.message}`);
                } else {
                    alert(`🔗 REFERER\n\n${results.referer.message}`);
                }

                // Alert InApp
                if (results.inApp.isInApp) {
                    alert(`📱 INAPP BROWSER DETECTED\n\n${results.inApp.message}`);
                } else {
                    alert(`📱 INAPP BROWSER\n\n${results.inApp.message}`);
                }

                // Alert WebView
                if (results.webView.isWebView) {
                    alert(`🌐 WEBVIEW DETECTED\n\n${results.webView.message}`);
                } else {
                    alert(`🌐 WEBVIEW\n\n${results.webView.message}`);
                }
            }
        }

        // Fungsi untuk menampilkan alert kustom (gabungan)
        function showCustomAlert() {
            const results = window._detectionResults;
            if (!results) {
                alert('⚠️ Silakan deteksi terlebih dahulu!');
                return;
            }

            let message = '📊 HASIL DETEKSI\n';
            message += '═'.repeat(30) + '\n\n';
            
            // Referer
            message += '🔗 REFERER: ';
            message += results.referer.isReferer ? 
                `ADA\n   ${results.referer.refererUrl}\n` : 
                'TIDAK ADA (Direct Access)\n';
            
            // InApp
            message += '\n📱 INAPP: ';
            message += results.inApp.isInApp ? 
                `TERDETEKASI\n   Aplikasi: ${results.inApp.appName}\n` : 
                'TIDAK (Browser Normal)\n';
            
            // WebView
            message += '\n🌐 WEBVIEW: ';
            message += results.webView.isWebView ? 
                `TERDETEKASI\n   Tipe: ${results.webView.webViewType}\n` : 
                'TIDAK (Browser Normal)\n';
            
            message += '\n' + '═'.repeat(30);
            alert(message);
        }

        // Fungsi reset
        function clearAll() {
            if (confirm('Yakin ingin mereset tampilan?')) {
                document.getElementById('refererStatus').textContent = '-';
                document.getElementById('refererStatus').className = 'value';
                document.getElementById('refererDetail').textContent = '-';
                document.getElementById('inappStatus').textContent = '-';
                document.getElementById('inappStatus').className = 'value';
                document.getElementById('inappDetail').textContent = '-';
                document.getElementById('webviewStatus').textContent = '-';
                document.getElementById('webviewStatus').className = 'value';
                document.getElementById('webviewDetail').textContent = '-';
                document.getElementById('userAgent').textContent = '-';
                document.getElementById('refererUrl').textContent = '-';
                document.getElementById('inappName').textContent = '-';
                document.getElementById('webviewType').textContent = '-';
                document.getElementById('statusSummary').textContent = '-';
                window._detectionResults = null;
                console.log('✅ Reset selesai');
            }
        }

        // Fungsi run detection
        function runDetection() {
            updateUI();
            // Tampilkan notifikasi
            const results = window._detectionResults;
            let message = '✅ Deteksi selesai!\n\n';
            if (results.referer.isReferer) message += `🔗 Referer: ${results.referer.refererUrl}\n`;
            if (results.inApp.isInApp) message += `📱 InApp: ${results.inApp.appName}\n`;
            if (results.webView.isWebView) message += `🌐 WebView: ${results.webView.webViewType}\n`;
            if (!results.referer.isReferer && !results.inApp.isInApp && !results.webView.isWebView) {
                message += 'Browser normal (direct access)';
            }
            alert(message);
        }

        // Cek apakah external JS sudah loaded
        function checkExternalJS() {
            if (typeof detectReferer === 'function' && 
                typeof detectInApp === 'function' && 
                typeof detectWebView === 'function') {
                console.log('✅ External JS loaded successfully!');
                updateUI();
            } else {
                console.log('⏳ Menunggu external JS selesai dimuat...');
                setTimeout(checkExternalJS, 500);
            }
        }

        // Jalankan saat DOM ready
        document.addEventListener('DOMContentLoaded', function() {
            // Tunggu sebentar untuk memastikan external JS termuat
            setTimeout(checkExternalJS, 1000);
        });

        // Expose fungsi ke global
        window.runDetection = runDetection;
        window.showAlerts = showAlerts;
        window.showCustomAlert = showCustomAlert;
        window.clearAll = clearAll;
        window.updateUI = updateUI;

        // Event listener untuk error loading
        window.addEventListener('error', function(e) {
            if (e.target.tagName === 'SCRIPT') {
                document.getElementById('loading').innerHTML = 
                    '❌ Gagal memuat script external. Periksa koneksi internet Anda.';
                document.getElementById('loading').style.color = '#e74c3c';
            }
        }, true);
    </script>
</body>
</html>
