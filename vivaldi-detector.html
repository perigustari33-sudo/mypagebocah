<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Uji navigator.userAgentData</title>
</head>
<body>
  <h2>Pengujian deteksi dari navigator.userAgentData (best-effort)</h2>

  <button id="btn" type="button">Cek & Alert</button>
  <pre id="out" style="margin-top:12px; background:#f5f5f5; padding:10px; white-space:pre-wrap;"></pre>

  <script>
    async function detectFromUserAgentData() {
      const uaData = navigator.userAgentData;

      if (!uaData) return { result: 'userAgentData tidak tersedia', brands: null };

      // Biasanya tersedia tanpa high entropy.
      const brands = uaData.brands || [];

      const brandStrings = brands.map(b => String(b.brand ?? ''));

      // Sesuai request kamu: pakai includes() pada string brand placeholder.
      const secPart = brandStrings.join(', ');

      let result = 'tidak terdeteksi (best-effort)';
      if (secPart.includes('Not/A)Brand')) result = 'Vivaldi (best-effort)';
      else if (secPart.includes('Not=A?Brand')) result = 'Chrome (best-effort)';

      return { result, brands };
    }

    document.getElementById('btn').addEventListener('click', async () => {
      const { result, brands } = await detectFromUserAgentData();
      alert(result);

      const out = document.getElementById('out');
      out.textContent =
        'Hasil: ' + result + '\n' +
        'brands:\n' + JSON.stringify(brands, null, 2) + '\n' +
        'navigator.userAgent:\n' + (navigator.userAgent || '');
    });
  </script>
</body>
</html>
