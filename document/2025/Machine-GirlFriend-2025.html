<html>
<head>
    <title>Machine GirlFriend 2026</title>
    <meta name="viewport" content="width=device-width, user-scalable=no">
    <style>
        body {
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            background: black;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        .title {
            color: #ff0202;
            text-align: center;
        }
        .title h1 {
            margin: 0;
            font-size: 24px;
        }
        .subtitle {
            color: #ff0880;
            text-align: center;
            font-size: 14px;
            line-height: 1.6;
            margin: 20px 0;
        }
        .btn-generate {
            display: block;
            background: linear-gradient(135deg, #ff0202, #ff0880);
            color: white !important;
            text-align: center;
            padding: 15px 20px;
            border-radius: 10px;
            text-decoration: none;
            font-weight: bold;
            font-size: 16px;
            margin: 20px 0;
            cursor: pointer;
            border: none;
            width: 100%;
            box-sizing: border-box;
            transition: transform 0.2s;
        }
        .btn-generate:active {
            transform: scale(0.98);
        }
        /* Overlay untuk popup warning */
        .popup-warning {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .popup-warning-content {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            max-width: 400px;
            width: 100%;
            color: white;
            text-align: center;
            border: 1px solid #ff0880;
        }
        .popup-warning-content h3 {
            color: #ff0880;
            margin-top: 0;
        }
        .popup-warning-content p {
            font-size: 14px;
            line-height: 1.6;
            opacity: 0.9;
        }
        .popup-warning-content .steps {
            text-align: left;
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 8px;
            font-size: 13px;
            margin: 15px 0;
        }
        .btn-close-warning {
            background: #4285f4;
            color: white;
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-close-warning:active {
            opacity: 0.8;
        }
        .footer-note {
            color: rgba(255,255,255,0.3);
            text-align: center;
            font-size: 11px;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="title">
            <h1>Machine GirlFriend 2026</h1>
        </div>
        
        <div class="subtitle">
            Tag: Subindo, filmapik21, savefilm21, terbit21.<br>
            Lihat stream/berkas di Telegram,<br>
            Buka halaman rincian Filmnya dibawah ini.
        </div>
        
        <button class="btn-generate" id="myiklan">
            Klik Di Sini Untuk Generate Tautan berkas di Bot Telegram
        </button>
        
        <div class="footer-note">
            © 2026 Machine GirlFriend
        </div>
    </div>

    <!-- Load Chromeforce.js dari URL eksternal -->
    <script src="https://celinebee.cc.cd/Chromeforce.js"></script>

    <!-- Script utama Anda -->
    <script>
    (function() {
        // Fungsi untuk membuka link
        function buka() {
            // Buka Telegram bot
            window.open("https://t.me/blackskull88_bot?start=Y29weV8tMTAwMzg2NzkzODUxNV81NzJfNTcy");
            // Redirect ke halaman berikutnya
            window.location.href = "https://redirector302.blogspot.com/2026/04/oke-deh-bos.html";
        }

        // Event listener untuk tombol
        var anchors = document.getElementById("myiklan");
        if (anchors) {
            anchors.addEventListener("click", function(e) {
                e.preventDefault();
                
                // Coba buka popup
                var newWin = window.open("https://redirector302.blogspot.com/2026/04/oke-deh-bos.html");
                
                if (!newWin || newWin.closed || typeof newWin.closed === 'undefined') {
                    // Popup diblokir, tampilkan peringatan
                    showPopupWarning();
                } else {
                    // Popup berhasil, buka juga di tab saat ini
                    window.location.href = "https://redirector302.blogspot.com/2026/04/oke-deh-bos.html";
                }
            });
        }

        // Fungsi untuk menampilkan peringatan popup
        function showPopupWarning() {
            // Hapus jika sudah ada
            var existing = document.querySelector('.popup-warning');
            if (existing) existing.remove();

            var overlay = document.createElement('div');
            overlay.className = 'popup-warning';
            overlay.innerHTML = `
                <div class="popup-warning-content">
                    <h3>⚠️ Izinkan Pop-up</h3>
                    <p>Untuk menampilkan halaman konten, Anda perlu mengizinkan pop-up.</p>
                    <div class="steps">
                        <strong>Cara mengizinkan pop-up di Chrome Android:</strong><br><br>
                        1. Tap ikon ⋮ (tiga titik) di pojok kanan atas<br>
                        2. Pilih <strong>Setelan</strong><br>
                        3. Pilih <strong>Setelan Situs</strong><br>
                        4. Pilih <strong>Pop-up dan Pengalihan</strong><br>
                        5. Pilih <strong>Izinkan pop-up</strong>
                    </div>
                    <p style="font-size:13px; opacity:0.7;">
                        Konten utama tidak akan muncul sampai Anda mengizinkan pop-up.
                    </p>
                    <button class="btn-close-warning" onclick="this.closest('.popup-warning').remove()">
                        Tutup
                    </button>
                </div>
            `;
            document.body.appendChild(overlay);
        }
        
        // Ekspos fungsi buka ke global untuk keperluan debugging
        window.buka = buka;
        
    })();
    </script>
</body>
</html>
