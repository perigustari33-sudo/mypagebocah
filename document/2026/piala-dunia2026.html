<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M3U Video Player</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a1a;
            color: #eee;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .player-container {
            max-width: 900px;
            width: 100%;
            background: #16213e;
            border-radius: 24px;
            padding: 25px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            transition: 0.3s;
        }
        h2 {
            text-align: center;
            font-weight: 400;
            letter-spacing: 1px;
            margin-bottom: 20px;
            color: #e0e0e0;
            border-bottom: 2px solid #0f3460;
            padding-bottom: 12px;
        }
        .loading-info {
            background: #0f3460;
            border-radius: 16px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: center;
            color: #8a9bb5;
        }
        .loading-info .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(233, 69, 96, 0.3);
            border-radius: 50%;
            border-top-color: #e94560;
            animation: spin 1s ease-in-out infinite;
            margin-right: 10px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            aspect-ratio: 16 / 9;
        }
        video {
            width: 100%;
            height: 100%;
            display: block;
            background: #000;
            outline: none;
        }
        .playlist-box {
            background: #0f3460;
            border-radius: 16px;
            padding: 10px 0;
            max-height: 250px;
            overflow-y: auto;
            margin-bottom: 20px;
            scrollbar-width: thin;
            scrollbar-color: #e94560 #0f3460;
        }
        .playlist-box::-webkit-scrollbar {
            width: 6px;
        }
        .playlist-box::-webkit-scrollbar-track {
            background: #0f3460;
            border-radius: 10px;
        }
        .playlist-box::-webkit-scrollbar-thumb {
            background: #e94560;
            border-radius: 10px;
        }
        .track-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 20px;
            border-bottom: 1px solid #1a3a6a;
            cursor: pointer;
            transition: 0.2s;
            color: #cfd8e6;
        }
        .track-item:last-child {
            border-bottom: none;
        }
        .track-item:hover {
            background: #1a3a6a;
            color: #fff;
        }
        .track-item.active {
            background: #e94560;
            color: #fff;
            border-radius: 8px;
            margin: 4px 8px;
            padding: 12px 16px;
        }
        .track-title {
            font-size: 0.95rem;
            font-weight: 500;
            word-break: break-word;
        }
        .track-duration {
            font-size: 0.8rem;
            background: #1a1a2e;
            padding: 4px 10px;
            border-radius: 30px;
            color: #aaa;
            white-space: nowrap;
            margin-left: 10px;
        }
        .track-item.active .track-duration {
            background: #c73652;
            color: #fff;
        }
        .controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn {
            background: #e94560;
            border: none;
            color: white;
            padding: 10px 18px;
            border-radius: 40px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            flex: 1;
            text-align: center;
            letter-spacing: 0.5px;
            min-width: 80px;
        }
        .btn:hover {
            background: #ff6b81;
            transform: scale(0.97);
        }
        .btn-secondary {
            background: #1a3a6a;
        }
        .btn-secondary:hover {
            background: #2a5a9a;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .status {
            font-size: 0.8rem;
            color: #8a9bb5;
            text-align: center;
            margin-top: 15px;
            padding: 8px;
            border-radius: 8px;
            background: #0a0a1a;
        }
        .status.error {
            color: #ff6b6b;
        }
        .status.success {
            color: #51cf66;
        }
        .status.warning {
            color: #ffd93d;
        }
        .status.loading {
            color: #74c0fc;
        }
        .track-count {
            font-size: 0.8rem;
            color: #8a9bb5;
            text-align: center;
            margin-top: 5px;
            margin-bottom: 10px;
        }
        .refresh-btn {
            background: #1a3a6a;
            color: #ccc;
            border: none;
            padding: 6px 14px;
            border-radius: 30px;
            cursor: pointer;
            font-size: 0.75rem;
            transition: 0.2s;
        }
        .refresh-btn:hover {
            background: #2a5a9a;
            color: white;
        }
        .video-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            font-size: 0.85rem;
            color: #8a9bb5;
            flex-wrap: wrap;
            gap: 5px;
        }
        .video-title {
            color: #e0e0e0;
            font-weight: 500;
        }
        @media (max-width: 600px) {
            .controls .btn {
                flex: 1 1 30%;
                min-width: 70px;
                font-size: 0.8rem;
                padding: 8px 12px;
            }
            .video-wrapper {
                aspect-ratio: 16 / 9;
            }
        }
    </style>
</head>
<body>

<div class="player-container">
    <h2>🎬 M3U Video Player</h2>

    <div class="loading-info" id="loadingInfo">
        <span class="spinner"></span>
        <span id="loadingText">Memuat playlist dari server...</span>
    </div>

    <div class="video-wrapper">
        <video id="videoPlayer" controls preload="metadata">
            <source src="" type="video/mp4">
            Browser tidak mendukung video.
        </video>
    </div>

    <div class="video-info">
        <span class="video-title" id="videoTitle">Belum ada video diputar</span>
        <span id="videoCounter">0 / 0</span>
    </div>

    <div class="playlist-box" id="playlistContainer">
        <div style="padding: 20px; text-align: center; color: #8a9bb5;">
            <span>⏳ Sedang memuat...</span>
        </div>
    </div>

    <div class="track-count" id="trackCount">Total: 0 video</div>

    <div class="controls">
        <button class="btn" id="playBtn" disabled>▶ Putar</button>
        <button class="btn btn-secondary" id="nextBtn" disabled>⏭ Selanjutnya</button>
        <button class="btn btn-secondary" id="prevBtn" disabled>⏮ Sebelumnya</button>
    </div>

    <div style="display: flex; gap: 8px; justify-content: center; margin-top: 12px; flex-wrap: wrap;">
        <button class="refresh-btn" id="refreshBtn">🔄 Refresh Playlist</button>
        <button class="refresh-btn" id="fullscreenBtn">⛶ Layar Penuh</button>
    </div>

    <div class="status" id="statusMessage">Status: Memuat playlist...</div>
</div>

<script>
    (function() {
        // URL M3U dari server
        const M3U_URL = 'https://celinebee.cc.cd/document/sports.m3u';

        // Data playlist
        let tracks = [];
        let currentIndex = 0;
        let isPlaying = false;
        let isLoading = false;

        // DOM elements
        const video = document.getElementById('videoPlayer');
        const playlistContainer = document.getElementById('playlistContainer');
        const statusMsg = document.getElementById('statusMessage');
        const trackCount = document.getElementById('trackCount');
        const loadingInfo = document.getElementById('loadingInfo');
        const loadingText = document.getElementById('loadingText');
        const videoTitle = document.getElementById('videoTitle');
        const videoCounter = document.getElementById('videoCounter');
        const playBtn = document.getElementById('playBtn');
        const nextBtn = document.getElementById('nextBtn');
        const prevBtn = document.getElementById('prevBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const fullscreenBtn = document.getElementById('fullscreenBtn');

        // --- Helper functions ---
        function setStatus(msg, type = 'info') {
            statusMsg.textContent = `Status: ${msg}`;
            statusMsg.className = 'status';
            if (type) statusMsg.classList.add(type);
        }

        function setLoading(loading, msg = 'Memuat playlist...') {
            isLoading = loading;
            if (loading) {
                loadingInfo.style.display = 'block';
                loadingText.textContent = msg;
                setStatus(msg, 'loading');
            } else {
                loadingInfo.style.display = 'none';
            }
        }

        function enableControls(enabled) {
            playBtn.disabled = !enabled;
            nextBtn.disabled = !enabled;
            prevBtn.disabled = !enabled;
            if (!enabled) {
                playBtn.textContent = '▶ Putar';
            }
        }

        function escapeHtml(unsafe) {
            return unsafe.replace(/[&<>"]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                if (m === '"') return '&quot;';
                return m;
            });
        }

        function updateVideoInfo() {
            if (tracks.length > 0 && currentIndex < tracks.length) {
                const track = tracks[currentIndex];
                videoTitle.textContent = track.title || 'Tanpa judul';
                videoCounter.textContent = `${currentIndex + 1} / ${tracks.length}`;
            } else {
                videoTitle.textContent = 'Belum ada video diputar';
                videoCounter.textContent = '0 / 0';
            }
        }

        // --- Render playlist ---
        function renderPlaylist() {
            if (!tracks.length) {
                playlistContainer.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #8a9bb5;">
                        <span>📂 Tidak ada video ditemukan</span><br>
                        <span style="font-size: 0.8rem;">Coba refresh atau periksa URL M3U</span>
                    </div>
                `;
                trackCount.textContent = 'Total: 0 video';
                updateVideoInfo();
                return;
            }

            let html = '';
            tracks.forEach((track, idx) => {
                const activeClass = (idx === currentIndex) ? 'active' : '';
                const durationDisplay = track.duration ? track.duration : '--:--';
                const title = track.title || 'Tanpa judul';
                html += `
                    <div class="track-item ${activeClass}" data-index="${idx}">
                        <span class="track-title">${escapeHtml(title)}</span>
                        <span class="track-duration">${durationDisplay}</span>
                    </div>
                `;
            });
            playlistContainer.innerHTML = html;
            trackCount.textContent = `Total: ${tracks.length} video`;
            updateVideoInfo();

            document.querySelectorAll('.track-item').forEach(item => {
                item.addEventListener('click', function() {
                    const index = parseInt(this.dataset.index, 10);
                    if (!isNaN(index) && index >= 0 && index < tracks.length) {
                        playTrack(index);
                    }
                });
            });
        }

        // --- Play track ---
        function playTrack(index) {
            if (!tracks.length || index < 0 || index >= tracks.length) {
                setStatus('Tidak ada video yang tersedia', 'warning');
                return;
            }
            currentIndex = index;
            const track = tracks[currentIndex];
            if (!track.file) {
                setStatus('File tidak ditemukan untuk video ini', 'error');
                return;
            }

            // Deteksi tipe video dari ekstensi
            const fileExt = track.file.split('.').pop().toLowerCase();
            let videoType = 'video/mp4';
            if (fileExt === 'mkv') videoType = 'video/x-matroska';
            else if (fileExt === 'avi') videoType = 'video/x-msvideo';
            else if (fileExt === 'mov') videoType = 'video/quicktime';
            else if (fileExt === 'webm') videoType = 'video/webm';
            else if (fileExt === 'ogg') videoType = 'video/ogg';
            else if (fileExt === 'm3u8') videoType = 'application/x-mpegURL';
            else if (fileExt === 'ts') videoType = 'video/MP2T';

            video.src = track.file;
            video.load();
            video.play().then(() => {
                isPlaying = true;
                playBtn.textContent = '⏸ Jeda';
                setStatus(`Memutar: ${track.title || 'Tanpa judul'}`, 'success');
                renderPlaylist();
            }).catch(err => {
                setStatus(`Gagal memutar: ${err.message}`, 'error');
                isPlaying = false;
                playBtn.textContent = '▶ Putar';
            });
        }

        function nextTrack() {
            if (!tracks.length) return;
            const next = (currentIndex + 1) % tracks.length;
            playTrack(next);
        }

        function prevTrack() {
            if (!tracks.length) return;
            const prev = (currentIndex - 1 + tracks.length) % tracks.length;
            playTrack(prev);
        }

        function togglePlay() {
            if (!tracks.length) {
                setStatus('Playlist kosong', 'warning');
                return;
            }
            if (video.paused) {
                if (video.src) {
                    video.play().then(() => {
                        isPlaying = true;
                        playBtn.textContent = '⏸ Jeda';
                        setStatus(`Memutar: ${tracks[currentIndex]?.title || 'Video'}`, 'success');
                    }).catch(err => {
                        setStatus('Gagal memutar', 'error');
                    });
                } else {
                    playTrack(currentIndex);
                }
            } else {
                video.pause();
                isPlaying = false;
                playBtn.textContent = '▶ Putar';
                setStatus('Dijeda', 'warning');
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    setStatus(`Gagal fullscreen: ${err.message}`, 'error');
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // --- Parse M3U ---
        function parseM3U(content) {
            const lines = content.split(/\r?\n/);
            const result = [];
            let currentTitle = '';
            let currentDuration = '';

            for (let line of lines) {
                line = line.trim();
                if (!line) continue;

                if (line.startsWith('#EXTINF:')) {
                    const parts = line.split(',');
                    if (parts.length >= 2) {
                        const durPart = parts[0].replace('#EXTINF:', '').trim();
                        const durNum = parseInt(durPart, 10);
                        currentDuration = durNum ? formatDuration(durNum) : '';
                        currentTitle = parts.slice(1).join(',').trim();
                    } else {
                        currentTitle = '';
                        currentDuration = '';
                    }
                    continue;
                }

                if (line.startsWith('#')) continue;

                if (line) {
                    if (!currentTitle) {
                        const fileName = line.split('/').pop().split('\\').pop() || line;
                        currentTitle = fileName;
                    }
                    result.push({
                        title: currentTitle,
                        file: line,
                        duration: currentDuration || ''
                    });
                    currentTitle = '';
                    currentDuration = '';
                }
            }
            return result;
        }

        function formatDuration(seconds) {
            if (!seconds || seconds < 0) return '';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${String(mins).padStart(2, '0')}:${String(secs).padStart(2, '0')}`;
        }

        // --- Load M3U dari server ---
        async function loadM3UFromServer() {
            if (isLoading) return;

            setLoading(true, 'Mengunduh playlist dari server...');
            enableControls(false);
            tracks = [];
            renderPlaylist();

            try {
                const response = await fetch(M3U_URL, {
                    mode: 'cors',
                    headers: {
                        'Accept': 'text/plain, application/x-mpegurl, audio/x-mpegurl'
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                const content = await response.text();
                const parsed = parseM3U(content);

                if (parsed.length) {
                    tracks = parsed;
                    currentIndex = 0;
                    renderPlaylist();
                    enableControls(true);
                    setStatus(`Berhasil memuat ${tracks.length} video dari server`, 'success');
                    
                    if (tracks.length > 0) {
                        playTrack(0);
                    }
                } else {
                    setStatus('Tidak ditemukan video dalam file M3U', 'warning');
                    enableControls(false);
                }
            } catch (err) {
                setStatus(`Gagal memuat: ${err.message}`, 'error');
                console.error('Error loading M3U:', err);
                enableControls(false);
                playlistContainer.innerHTML = `
                    <div style="padding: 20px; text-align: center; color: #ff6b6b;">
                        <span>❌ Gagal memuat playlist</span><br>
                        <span style="font-size: 0.8rem;">${err.message}</span>
                    </div>
                `;
            } finally {
                setLoading(false);
            }
        }

        // --- Event listeners ---
        playBtn.addEventListener('click', togglePlay);
        nextBtn.addEventListener('click', nextTrack);
        prevBtn.addEventListener('click', prevTrack);
        refreshBtn.addEventListener('click', loadM3UFromServer);
        fullscreenBtn.addEventListener('click', toggleFullscreen);

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.target.tagName === 'INPUT') return;
            
            switch(e.key) {
                case ' ':
                case 'Space':
                    e.preventDefault();
                    togglePlay();
                    break;
                case 'ArrowRight':
                    e.preventDefault();
                    nextTrack();
                    break;
                case 'ArrowLeft':
                    e.preventDefault();
                    prevTrack();
                    break;
                case 'f':
                case 'F':
                    toggleFullscreen();
                    break;
            }
        });

        // Video events
        video.addEventListener('ended', function() {
            if (tracks.length) {
                nextTrack();
            } else {
                isPlaying = false;
                playBtn.textContent = '▶ Putar';
                setStatus('Selesai', 'info');
            }
        });

        video.addEventListener('play', function() {
            isPlaying = true;
            playBtn.textContent = '⏸ Jeda';
        });
        video.addEventListener('pause', function() {
            isPlaying = false;
            playBtn.textContent = '▶ Putar';
        });

        video.addEventListener('error', function(e) {
            setStatus(`Error video: ${e.target.error?.message || 'Tidak bisa memutar'}`, 'error');
            isPlaying = false;
            playBtn.textContent = '▶ Putar';
        });

        // --- Start ---
        window.addEventListener('load', function() {
            loadM3UFromServer();
        });

    })();
</script>
</body>
</html>
