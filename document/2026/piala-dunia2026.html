<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pemutar Stream HLS</title>

    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 16px;
        }

        .player-wrapper {
            width: 100%;
            max-width: 960px;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a2a;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            overflow: hidden;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: block;
        }

        .info-bar {
            padding: 16px 20px;
            background: #141414;
            border-top: 1px solid #2a2a2a;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #aaa;
        }

        .status .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }

        .status .dot.loading {
            background: #f0ad4e;
            animation: pulse 1s infinite;
        }

        .status .dot.playing {
            background: #5cb85c;
        }

        .status .dot.error {
            background: #d9534f;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        .status-text {
            transition: color 0.3s;
        }

        .url-label {
            font-size: 12px;
            color: #666;
            background: #222;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
            border: 1px solid #333;
            font-family: 'Courier New', monospace;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            background: #2a2a2a;
            border: none;
            color: #ddd;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #3a3a3a;
        }

        .btn:hover {
            background: #3a3a3a;
            color: #fff;
        }

        .btn-primary {
            background: #007bff;
            border-color: #007bff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #0056b3;
            border-color: #0056b3;
        }

        .btn-danger {
            background: #d9534f;
            border-color: #d9534f;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c9302c;
            border-color: #c9302c;
        }

        .btn-success {
            background: #5cb85c;
            border-color: #5cb85c;
            color: #fff;
        }

        .btn-success:hover {
            background: #449d44;
            border-color: #449d44;
        }

        .btn-warning {
            background: #f0ad4e;
            border-color: #f0ad4e;
            color: #fff;
        }

        .btn-warning:hover {
            background: #ec971f;
            border-color: #ec971f;
        }

        .debug-panel {
            padding: 12px 20px;
            background: #0d0d0d;
            border-top: 1px solid #222;
            font-size: 12px;
            color: #666;
            max-height: 180px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            display: none;
        }

        .debug-panel.show {
            display: block;
        }

        .debug-panel .log-entry {
            padding: 3px 0;
            border-bottom: 1px solid #1a1a1a;
            color: #888;
            font-size: 11px;
            word-break: break-all;
        }

        .debug-panel .log-entry.error {
            color: #d9534f;
        }

        .debug-panel .log-entry.success {
            color: #5cb85c;
        }

        .debug-panel .log-entry.info {
            color: #5bc0de;
        }

        .debug-panel .log-entry.warning {
            color: #f0ad4e;
        }

        .response-preview {
            padding: 12px 20px;
            background: #111;
            border-top: 1px solid #222;
            font-size: 12px;
            color: #888;
            max-height: 150px;
            overflow-y: auto;
            display: none;
            font-family: 'Courier New', monospace;
            white-space: pre-wrap;
            word-break: break-all;
        }

        .response-preview.show {
            display: block;
        }

        @media (max-width: 600px) {
            .info-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .btn-group {
                justify-content: center;
            }

            .url-label {
                max-width: 100%;
                text-align: center;
            }

            .status {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <div class="video-container">
            <video id="video" controls playsinline></video>
        </div>

        <div class="info-bar">
            <div class="status">
                <span class="dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Siap...</span>
            </div>

            <div class="url-label" id="urlDisplay">📡 celinebee.cc.cd</div>

            <div class="btn-group">
                <button class="btn btn-primary" id="btnPlay">▶ Putar</button>
                <button class="btn btn-danger" id="btnStop">⏹ Stop</button>
                <button class="btn btn-warning" id="btnReload">⟳ Reload</button>
                <button class="btn btn-success" id="btnFetch">📥 Cek URL</button>
                <button class="btn" id="btnDebug">🐞 Debug</button>
            </div>
        </div>

        <div class="response-preview" id="responsePreview"></div>
        <div class="debug-panel" id="debugPanel">
            <div id="logContainer"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const STREAM_URL = 'https://celinebee.cc.cd/document/sports.m3u';

            const video = document.getElementById('video');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const urlDisplay = document.getElementById('urlDisplay');
            const debugPanel = document.getElementById('debugPanel');
            const logContainer = document.getElementById('logContainer');
            const responsePreview = document.getElementById('responsePreview');

            let hls = null;
            let isPlaying = false;
            let debugMode = false;
            let retryCount = 0;
            const MAX_RETRIES = 5;

            // ---------- LOGGING ----------
            function log(msg, type = 'info') {
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                const time = new Date().toLocaleTimeString();
                entry.textContent = `[${time}] ${msg}`;
                logContainer.appendChild(entry);
                logContainer.scrollTop = logContainer.scrollHeight;
                console.log(`[${type.toUpperCase()}] ${msg}`);
            }

            function setStatus(type, msg) {
                statusDot.className = 'dot';
                if (type) statusDot.classList.add(type);
                statusText.textContent = msg || '—';
                if (debugMode) log(`Status: ${msg}`, type || 'info');
            }

            // ---------- CEK RESPONSE URL ----------
            async function checkUrl() {
                setStatus('loading', 'Mengecek URL...');
                log('Mengecek response dari: ' + STREAM_URL, 'info');
                responsePreview.classList.add('show');
                responsePreview.textContent = 'Loading...';

                try {
                    const response = await fetch(STREAM_URL, {
                        headers: {
                            'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                            'Accept': '*/*',
                            'Origin': window.location.origin,
                        }
                    });

                    const text = await response.text();

                    responsePreview.textContent = `📥 STATUS: ${response.status} ${response.statusText}\n` +
                        `📋 CONTENT-TYPE: ${response.headers.get('content-type') || 'unknown'}\n` +
                        `📏 LENGTH: ${text.length} characters\n` +
                        `━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n` +
                        text.substring(0, 2000) + (text.length > 2000 ? '\n... (truncated)' : '');

                    log(`Response: ${response.status} ${response.statusText}`, response.ok ? 'success' : 'error');
                    log(`Content-Type: ${response.headers.get('content-type')}`);

                    if (text.trim().startsWith('#')) {
                        log('✅ Ini adalah file M3U yang valid!', 'success');
                        setStatus('', '✅ M3U valid');
                        // Cek apakah ada #EXT-X-STREAM-INF (master playlist) atau #EXTINF (media playlist)
                        if (text.includes('#EXT-X-STREAM-INF')) {
                            log('📋 Ini adalah MASTER playlist (berisi multiple bitrate)', 'info');
                            // Extract URLs dari master playlist
                            const lines = text.split('\n');
                            const urls = lines.filter(line => line.trim() && !line.startsWith('#'));
                            log(`Ditemukan ${urls.length} stream di dalamnya`, 'info');
                            urls.forEach((u, i) => log(`  ${i+1}. ${u}`, 'info'));
                        } else if (text.includes('#EXTINF')) {
                            log('📋 Ini adalah MEDIA playlist (langsung ke segmen TS)', 'info');
                        } else {
                            log('⚠ M3U tidak memiliki #EXTINF atau #EXT-X-STREAM-INF', 'warning');
                        }
                    } else {
                        log('❌ BUKAN file M3U yang valid!', 'error');
                        log('Response dimulai dengan: ' + text.substring(0, 100), 'error');
                        setStatus('error', '❌ Bukan M3U');
                    }

                } catch (e) {
                    responsePreview.textContent = '❌ ERROR: ' + e.message;
                    log('Fetch error: ' + e.message, 'error');
                    setStatus('error', 'Gagal cek URL');
                }
            }

            // ---------- DESTROY HLS ----------
            function destroyHls() {
                if (hls) {
                    try {
                        hls.destroy();
                        log('HLS destroyed', 'info');
                    } catch (e) {
                        log('Error destroying HLS: ' + e.message, 'error');
                    }
                    hls = null;
                }
                isPlaying = false;
            }

            // ---------- LOAD STREAM ----------
            function loadStream() {
                destroyHls();

                video.removeAttribute('src');
                video.load();

                setStatus('loading', 'Memuat stream...');
                log('Memuat: ' + STREAM_URL, 'info');

                // CEK NATIVE HLS (Safari/iOS)
                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    log('Menggunakan native HLS (Safari)', 'info');
                    video.src = STREAM_URL;
                    video.play()
                        .then(() => {
                            isPlaying = true;
                            setStatus('playing', '▶ Native HLS');
                            log('Native HLS berjalan', 'success');
                        })
                        .catch((err) => {
                            setStatus('error', 'Native HLS gagal');
                            log('Native HLS error: ' + err.message, 'error');
                            loadWithHlsJs();
                        });
                    return;
                }

                loadWithHlsJs();
            }

            function loadWithHlsJs() {
                if (!Hls.isSupported()) {
                    setStatus('error', '⚠ HLS tidak didukung');
                    log('HLS tidak didukung browser ini', 'error');
                    return;
                }

                log('Menggunakan HLS.js', 'info');

                const config = {
                    enableWorker: true,
                    lowLatencyMode: true,
                    backbufferLength: 30,
                    maxBufferLength: 30,
                    // Coba berbagai konfigurasi untuk levelParsingError
                    fragLoadingMaxRetry: 6,
                    levelLoadingMaxRetry: 6,
                    manifestLoadingMaxRetry: 6,
                    manifestLoadingTimeOut: 30000,
                    levelLoadingTimeOut: 30000,
                    fragLoadingTimeOut: 30000,
                    // Abaikan kesalahan parsing jika memungkinkan
                    enableSoftwareAES: true,
                    // Coba dengan berbagai mode
                    startLevel: -1,
                    // Mode CORS
                    xhrSetup: function(xhr, url) {
                        xhr.withCredentials = false;
                        xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');
                        xhr.setRequestHeader('Accept', '*/*');
                        xhr.setRequestHeader('Origin', window.location.origin);
                        // Coba tambahkan referer
                        xhr.setRequestHeader('Referer', window.location.href);

                        // Log setiap request
                        log('XHR Request: ' + url.substring(0, 80) + (url.length > 80 ? '...' : ''), 'info');
                    },
                    fetchSetup: function(context, initParams) {
                        return fetch(context.url, {
                            ...initParams,
                            mode: 'cors',
                            credentials: 'omit',
                            headers: {
                                ...initParams.headers,
                                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
                                'Accept': '*/*',
                                'Referer': window.location.href,
                            }
                        });
                    }
                };

                hls = new Hls(config);

                // ---------- EVENT HANDLERS ----------
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    log('✅ MANIFEST PARSED!', 'success');
                    video.play()
                        .then(() => {
                            isPlaying = true;
                            setStatus('playing', '▶ HLS.js');
                            log('Video mulai diputar', 'success');
                            retryCount = 0;
                        })
                        .catch((err) => {
                            setStatus('error', 'Gagal play: ' + err.message);
                            log('Play error: ' + err.message, 'error');
                        });
                });

                hls.on(Hls.Events.LEVEL_LOADED, function(event, data) {
                    log('Level loaded: ' + (data.level ? data.level.url : 'unknown'), 'info');
                });

                hls.on(Hls.Events.LEVEL_SWITCHING, function(event, data) {
                    log('Switch ke level: ' + data.level, 'info');
                });

                hls.on(Hls.Events.FRAG_LOADED, function(event, data) {
                    // log('Fragment loaded: ' + data.frag.sn, 'info');
                });

                hls.on(Hls.Events.FRAG_PARSING_INIT_SEGMENT, function() {
                    log('Init segment diproses', 'info');
                });

                hls.on(Hls.Events.FRAG_PARSING_DATA, function() {
                    log('Data fragment diproses', 'info');
                });

                // ---------- TANGANI levelParsingError ----------
                hls.on(Hls.Events.ERROR, function(event, data) {
                    log(`HLS Error: ${data.details}`, 'error');

                    // Tangani levelParsingError secara spesifik
                    if (data.details === 'levelParsingError') {
                        log('⚠️ LEVEL PARSING ERROR - Mungkin format M3U tidak standar', 'error');
                        log('URL yang gagal: ' + (data.url || 'unknown'), 'error');

                        if (data.response) {
                            log('Response: ' + data.response.substring(0, 300), 'error');
                            responsePreview.classList.add('show');
                            responsePreview.textContent = '❌ LEVEL PARSING ERROR\n' +
                                'Response dari server:\n' +
                                '━━━━━━━━━━━━━━━━━━━━━━━━━━━━━\n' +
                                (data.response || '(empty)').substring(0, 1000);
                        }

                        // Coba alternatif: gunakan URL langsung sebagai src jika itu file TS
                        if (STREAM_URL.endsWith('.m3u8') || STREAM_URL.endsWith('.m3u')) {
                            log('Mencoba metode alternatif...', 'warning');
                            // Coba dengan video.js atau langsung
                            tryAlternativePlayback();
                        }

                        if (retryCount < MAX_RETRIES) {
                            retryCount++;
                            log(`Retry ${retryCount}/${MAX_RETRIES}...`, 'warning');
                            setTimeout(() => {
                                hls.loadSource(STREAM_URL);
                            }, 2000);
                        } else {
                            log('Max retry reached', 'error');
                            setStatus('error', '❌ Gagal parsing M3U');
                        }
                        return;
                    }

                    if (data.fatal) {
                        setStatus('error', 'Fatal: ' + data.details);
                        log('FATAL ERROR: ' + JSON.stringify(data), 'error');

                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                if (retryCount < MAX_RETRIES) {
                                    retryCount++;
                                    log('Network error, retry ' + retryCount, 'warning');
                                    hls.startLoad();
                                } else {
                                    log('Max retry, reload', 'error');
                                    setTimeout(reloadStream, 3000);
                                }
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                log('Media error recovered', 'info');
                                break;
                            default:
                                log('Tidak bisa recover', 'error');
                                break;
                        }
                    } else {
                        if (data.details === 'manifestLoadingError' || data.details === 'manifestIncompleteError') {
                            setStatus('error', 'Gagal load manifest');
                            log('Mungkin CORS atau server error', 'error');
                        }
                    }
                });

                hls.on(Hls.Events.BUFFER_APPENDING, function() {
                    setStatus('loading', '⏳ Buffering...');
                });

                hls.on(Hls.Events.BUFFER_APPENDED, function() {
                    if (!isPlaying) {
                        setStatus('playing', '▶ Streaming');
                    }
                });

                // Load source
                try {
                    hls.loadSource(STREAM_URL);
                    hls.attachMedia(video);
                    log('HLS source loaded', 'info');
                } catch (e) {
                    log('Error loading source: ' + e.message, 'error');
                    setStatus('error', 'Gagal load source');
                }

                // Timeout
                const timeout = setTimeout(() => {
                    if (!isPlaying && hls) {
                        log('⏱ Loading timeout', 'error');
                        setStatus('error', '⏱ Timeout');
                        // Coba cek URL
                        checkUrl();
                    }
                }, 30000);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    clearTimeout(timeout);
                });
            }

            // ---------- ALTERNATIVE PLAYBACK ----------
            function tryAlternativePlayback() {
                log('Mencoba alternatif: fetch + MediaSource', 'warning');
                setStatus('loading', '🔄 Mencoba alternatif...');

                // Coba langsung dengan video jika URL mengarah ke TS
                if (STREAM_URL.includes('.ts')) {
                    video.src = STREAM_URL;
                    video.play().catch(() => {});
                    return;
                }

                // Coba cari URL TS dari M3U
                fetch(STREAM_URL, {
                    headers: {
                        'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                    }
                })
                .then(res => res.text())
                .then(text => {
                    const lines = text.split('\n');
                    const tsUrls = lines.filter(line =>
                        line.trim() && !line.startsWith('#') && line.includes('.ts')
                    );
                    if (tsUrls.length > 0) {
                        const firstTs = tsUrls[0].startsWith('http') ? tsUrls[0] :
                            new URL(tsUrls[0], STREAM_URL).href;
                        log('Menemukan TS: ' + firstTs, 'success');
                        video.src = firstTs;
                        video.play().catch(() => {});
                    } else {
                        log('Tidak menemukan TS di M3U', 'error');
                    }
                })
                .catch(e => {
                    log('Alternative fetch gagal: ' + e.message, 'error');
                });
            }

            // ---------- STOP ----------
            function stopStream() {
                destroyHls();
                video.pause();
                video.removeAttribute('src');
                video.load();
                isPlaying = false;
                retryCount = 0;
                setStatus('', '⏹ Berhenti');
                log('Stream dihentikan', 'info');
            }

            // ---------- RELOAD ----------
            function reloadStream() {
                log('🔄 Reload stream...', 'info');
                stopStream();
                setTimeout(() => {
                    loadStream();
                }, 500);
            }

            // ---------- EVENT LISTENERS ----------
            document.getElementById('btnPlay').addEventListener('click', function() {
                if (!isPlaying) {
                    loadStream();
                } else if (video.paused) {
                    video.play().catch(() => {});
                    setStatus('playing', '▶ Melanjutkan');
                }
            });

            document.getElementById('btnStop').addEventListener('click', stopStream);
            document.getElementById('btnReload').addEventListener('click', reloadStream);
            document.getElementById('btnFetch').addEventListener('click', checkUrl);

            document.getElementById('btnDebug').addEventListener('click', function() {
                debugMode = !debugMode;
                debugPanel.classList.toggle('show');
                this.textContent = debugMode ? '🔒 Debug' : '🐞 Debug';
                if (debugMode) {
                    log('🔍 Debug mode aktif', 'info');
                }
            });

            urlDisplay.textContent = '📡 ' + STREAM_URL.replace(/^https?:\/\//, '').split('/')[0];

            // Auto-load
            window.addEventListener('load', function() {
                setTimeout(() => {
                    loadStream();
                    // Cek URL juga untuk diagnosa
                    setTimeout(checkUrl, 2000);
                }, 800);
            });

            video.addEventListener('error', function(e) {
                const errorMsg = video.error ? video.error.message : 'unknown';
                log('Video error: ' + errorMsg, 'error');
            });

            console.log('📺 Pemutar HLS dengan diagnosa levelParsingError');
            console.log('🔗 URL:', STREAM_URL);
            console.log('💡 Klik "Cek URL" untuk melihat response server');

        })();
    </script>

</body>
</html>
