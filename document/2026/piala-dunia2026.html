<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pemutar Stream HLS</title>

    <!-- HLS.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 16px;
        }

        .player-wrapper {
            width: 100%;
            max-width: 960px;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a2a;
        }

        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%;
            background: #000;
            overflow: hidden;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: block;
        }

        .info-bar {
            padding: 16px 20px;
            background: #141414;
            border-top: 1px solid #2a2a2a;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #aaa;
        }

        .status .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }

        .status .dot.loading {
            background: #f0ad4e;
            animation: pulse 1s infinite;
        }

        .status .dot.playing {
            background: #5cb85c;
        }

        .status .dot.error {
            background: #d9534f;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        .status-text {
            transition: color 0.3s;
        }

        .url-label {
            font-size: 12px;
            color: #666;
            background: #222;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
            border: 1px solid #333;
            font-family: 'Courier New', monospace;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            background: #2a2a2a;
            border: none;
            color: #ddd;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #3a3a3a;
        }

        .btn:hover {
            background: #3a3a3a;
            color: #fff;
        }

        .btn-primary {
            background: #007bff;
            border-color: #007bff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #0056b3;
            border-color: #0056b3;
        }

        .btn-danger {
            background: #d9534f;
            border-color: #d9534f;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c9302c;
            border-color: #c9302c;
        }

        .btn-warning {
            background: #f0ad4e;
            border-color: #f0ad4e;
            color: #fff;
        }

        .btn-warning:hover {
            background: #ec971f;
            border-color: #ec971f;
        }

        .debug-panel {
            padding: 12px 20px;
            background: #0d0d0d;
            border-top: 1px solid #222;
            font-size: 12px;
            color: #666;
            max-height: 120px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            display: none;
        }

        .debug-panel.show {
            display: block;
        }

        .debug-panel .log-entry {
            padding: 2px 0;
            border-bottom: 1px solid #1a1a1a;
            color: #888;
        }

        .debug-panel .log-entry.error {
            color: #d9534f;
        }

        .debug-panel .log-entry.success {
            color: #5cb85c;
        }

        .debug-panel .log-entry.info {
            color: #5bc0de;
        }

        @media (max-width: 600px) {
            .info-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .btn-group {
                justify-content: center;
            }

            .url-label {
                max-width: 100%;
                text-align: center;
            }

            .status {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <div class="video-container">
            <video id="video" controls playsinline></video>
        </div>

        <div class="info-bar">
            <div class="status">
                <span class="dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Siap...</span>
            </div>

            <div class="url-label" id="urlDisplay">📡 celinebee.cc.cd</div>

            <div class="btn-group">
                <button class="btn btn-primary" id="btnPlay">▶ Putar</button>
                <button class="btn btn-danger" id="btnStop">⏹ Stop</button>
                <button class="btn btn-warning" id="btnReload">⟳ Reload</button>
                <button class="btn" id="btnDebug">🐞 Debug</button>
            </div>
        </div>

        <div class="debug-panel" id="debugPanel">
            <div id="logContainer"></div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            const STREAM_URL = 'https://celinebee.cc.cd/document/sports.m3u';

            const video = document.getElementById('video');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const urlDisplay = document.getElementById('urlDisplay');
            const debugPanel = document.getElementById('debugPanel');
            const logContainer = document.getElementById('logContainer');

            let hls = null;
            let isPlaying = false;
            let debugMode = false;
            let retryCount = 0;
            const MAX_RETRIES = 3;

            // ---------- LOGGING ----------
            function log(msg, type = 'info') {
                const entry = document.createElement('div');
                entry.className = `log-entry ${type}`;
                const time = new Date().toLocaleTimeString();
                entry.textContent = `[${time}] ${msg}`;
                logContainer.appendChild(entry);
                logContainer.scrollTop = logContainer.scrollHeight;
                console.log(`[${type.toUpperCase()}] ${msg}`);
            }

            function setStatus(type, msg) {
                statusDot.className = 'dot';
                if (type) statusDot.classList.add(type);
                statusText.textContent = msg || '—';
                if (debugMode) log(`Status: ${msg}`, type || 'info');
            }

            // ---------- CORS PROXY ----------
            function getProxiedUrl(url) {
                // Coba beberapa proxy jika CORS bermasalah
                const proxies = [
                    `https://corsproxy.io/?${encodeURIComponent(url)}`,
                    `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
                ];
                // Kembalikan URL asli dulu, proxy hanya jika diperlukan
                return url;
            }

            // ---------- DESTROY HLS ----------
            function destroyHls() {
                if (hls) {
                    try {
                        hls.destroy();
                        log('HLS destroyed', 'info');
                    } catch (e) {
                        log('Error destroying HLS: ' + e.message, 'error');
                    }
                    hls = null;
                }
                isPlaying = false;
            }

            // ---------- LOAD STREAM with HLS.js ----------
            function loadStream() {
                destroyHls();

                video.removeAttribute('src');
                video.load();

                setStatus('loading', 'Memuat stream...');
                log('Memuat: ' + STREAM_URL, 'info');

                // CEK NATIVE HLS (Safari/iOS)
                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    log('Menggunakan native HLS (Safari)', 'info');
                    video.src = STREAM_URL;
                    video.play()
                        .then(() => {
                            isPlaying = true;
                            setStatus('playing', '▶ Native HLS');
                            log('Native HLS berjalan', 'success');
                        })
                        .catch((err) => {
                            setStatus('error', 'Native HLS gagal');
                            log('Native HLS error: ' + err.message, 'error');
                            // Fallback ke hls.js
                            loadWithHlsJs();
                        });
                    return;
                }

                loadWithHlsJs();
            }

            function loadWithHlsJs() {
                if (!Hls.isSupported()) {
                    setStatus('error', '⚠ HLS tidak didukung');
                    log('HLS tidak didukung browser ini', 'error');
                    return;
                }

                log('Menggunakan HLS.js', 'info');

                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backbufferLength: 30,
                    maxBufferLength: 30,
                    xhrSetup: function(xhr, url) {
                        // Tambahkan header untuk mengatasi CORS
                        xhr.withCredentials = false;
                        // Set custom user-agent agar server mengizinkan
                        xhr.setRequestHeader('User-Agent', 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36');
                        xhr.setRequestHeader('Origin', window.location.origin);
                        // Allow any response
                        xhr.onreadystatechange = function() {
                            if (xhr.readyState === 4) {
                                log('XHR status: ' + xhr.status + ' untuk ' + url.substring(0, 60), 'info');
                            }
                        };
                    },
                    // Coba tanpa CORS strict
                    fetchSetup: function(context, initParams) {
                        // Override fetch untuk menangani CORS
                        return fetch(context.url, {
                            ...initParams,
                            mode: 'cors',
                            credentials: 'omit',
                            headers: {
                                ...initParams.headers,
                                'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36'
                            }
                        });
                    }
                });

                // Event listeners
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    log('Manifest berhasil diparsing', 'success');
                    video.play()
                        .then(() => {
                            isPlaying = true;
                            setStatus('playing', '▶ HLS.js');
                            log('Video mulai diputar', 'success');
                            retryCount = 0;
                        })
                        .catch((err) => {
                            setStatus('error', 'Gagal play: ' + err.message);
                            log('Play error: ' + err.message, 'error');
                        });
                });

                hls.on(Hls.Events.LEVEL_LOADED, function(event, data) {
                    log('Level loaded: ' + (data.level ? data.level.url : 'unknown'), 'info');
                });

                hls.on(Hls.Events.FRAG_LOADED, function(event, data) {
                    log('Fragment loaded: ' + data.frag.sn, 'info');
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    log('HLS Error: ' + data.details + ' - ' + (data.error || ''), 'error');

                    if (data.fatal) {
                        setStatus('error', 'Fatal: ' + data.details);
                        log('FATAL ERROR: ' + JSON.stringify(data), 'error');

                        // Recovery
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                if (retryCount < MAX_RETRIES) {
                                    retryCount++;
                                    log('Retry ' + retryCount + '/' + MAX_RETRIES, 'info');
                                    hls.startLoad();
                                } else {
                                    log('Max retry reached, coba reload', 'error');
                                    setTimeout(reloadStream, 2000);
                                }
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                log('Media error recovered', 'info');
                                break;
                            default:
                                log('Tidak bisa recover, reload manual', 'error');
                                break;
                        }
                    } else {
                        // Non-fatal
                        if (data.details === 'manifestLoadingError') {
                            setStatus('error', 'Gagal load manifest (CORS?)');
                            log('Mungkin masalah CORS - coba proxy', 'error');
                            // Coba dengan proxy
                            tryWithProxy();
                        }
                    }
                });

                hls.on(Hls.Events.BUFFER_APPENDING, function() {
                    setStatus('loading', '⏳ Buffering...');
                });

                hls.on(Hls.Events.BUFFER_APPENDED, function() {
                    if (!isPlaying) {
                        setStatus('playing', '▶ Streaming');
                    }
                });

                // Load source
                try {
                    hls.loadSource(STREAM_URL);
                    hls.attachMedia(video);
                    log('HLS source loaded', 'info');
                } catch (e) {
                    log('Error loading source: ' + e.message, 'error');
                    setStatus('error', 'Gagal load source');
                }

                // Timeout
                const timeout = setTimeout(() => {
                    if (!isPlaying && hls) {
                        log('Loading timeout, mungkin CORS', 'error');
                        setStatus('error', '⏱ Timeout - coba reload');
                        // Coba dengan proxy
                        tryWithProxy();
                    }
                }, 20000);
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    clearTimeout(timeout);
                });
            }

            // ---------- PROXY FALLBACK ----------
            let usingProxy = false;

            function tryWithProxy() {
                if (usingProxy) return;
                usingProxy = true;
                log('Mencoba dengan proxy CORS...', 'info');
                setStatus('loading', '🔄 Mencoba proxy...');

                const proxyUrl = `https://corsproxy.io/?${encodeURIComponent(STREAM_URL)}`;

                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    video.src = proxyUrl;
                    video.play().catch(() => {});
                    return;
                }

                if (hls) {
                    destroyHls();
                }

                if (!Hls.isSupported()) {
                    setStatus('error', 'HLS tidak didukung');
                    return;
                }

                hls = new Hls({
                    enableWorker: false,
                    lowLatencyMode: true,
                });

                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().then(() => {
                        isPlaying = true;
                        setStatus('playing', '▶ Proxy HLS');
                        log('Proxy berhasil!', 'success');
                    }).catch((e) => {
                        log('Proxy play error: ' + e.message, 'error');
                    });
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    log('Proxy error: ' + data.details, 'error');
                    if (data.fatal) {
                        setStatus('error', 'Proxy gagal');
                        log('Proxy gagal total, coba manual', 'error');
                    }
                });

                hls.loadSource(proxyUrl);
                hls.attachMedia(video);
            }

            // ---------- STOP ----------
            function stopStream() {
                destroyHls();
                video.pause();
                video.removeAttribute('src');
                video.load();
                isPlaying = false;
                usingProxy = false;
                retryCount = 0;
                setStatus('', '⏹ Berhenti');
                log('Stream dihentikan', 'info');
            }

            // ---------- RELOAD ----------
            function reloadStream() {
                log('Reload stream...', 'info');
                stopStream();
                usingProxy = false;
                retryCount = 0;
                setTimeout(() => {
                    loadStream();
                }, 500);
            }

            // ---------- EVENT LISTENERS ----------
            document.getElementById('btnPlay').addEventListener('click', function() {
                if (!isPlaying) {
                    loadStream();
                } else if (video.paused) {
                    video.play().catch(() => {});
                    setStatus('playing', '▶ Melanjutkan');
                }
            });

            document.getElementById('btnStop').addEventListener('click', stopStream);
            document.getElementById('btnReload').addEventListener('click', reloadStream);

            document.getElementById('btnDebug').addEventListener('click', function() {
                debugMode = !debugMode;
                debugPanel.classList.toggle('show');
                this.textContent = debugMode ? '🔒 Debug' : '🐞 Debug';
                if (debugMode) {
                    log('Debug mode aktif', 'info');
                }
            });

            // Tampilkan URL
            urlDisplay.textContent = '📡 ' + STREAM_URL.replace(/^https?:\/\//, '').split('/')[0];

            // Auto-load
            window.addEventListener('load', function() {
                setTimeout(loadStream, 800);
            });

            // Video error handler
            video.addEventListener('error', function(e) {
                const errorMsg = video.error ? video.error.message : 'unknown';
                log('Video error: ' + errorMsg, 'error');
                if (!hls && !video.src) {
                    setStatus('error', 'Video error: ' + errorMsg);
                }
            });

            console.log('📺 Pemutar HLS dengan dukungan CORS');
            console.log('🔗 URL:', STREAM_URL);
            console.log('💡 Jika gagal, klik tombol Debug untuk melihat log');

        })();
    </script>

</body>
</html>
