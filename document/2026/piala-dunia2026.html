<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0 user-scalable=0"/>
    <title>Pemutar Streaming HLS</title>

    <!-- ============================================ -->
    <!-- 1. Sertakan library HLS.js dari CDN           -->
    <!-- ============================================ -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* Reset & styling minimalis */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0e14;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            padding: 16px;
        }

        .player-container {
            max-width: 900px;
            width: 100%;
            background: #1a1f2a;
            border-radius: 20px;
            padding: 20px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7);
        }

        .video-wrapper {
            position: relative;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
        }

        video {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 16 / 9;
            background: #0a0c10;
            outline: none;
        }

        /* Info & status di bawah player */
        .info-panel {
            margin-top: 18px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 12px 18px;
            color: #b0b8c5;
            font-size: 0.9rem;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #232a36;
            padding: 6px 16px 6px 12px;
            border-radius: 40px;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #6c7a8a;
            transition: background 0.2s;
        }

        .status-dot.loading {
            background: #fbbf24;
            animation: pulse-dot 1s infinite;
        }

        .status-dot.playing {
            background: #34d399;
        }

        .status-dot.error {
            background: #f87171;
        }

        @keyframes pulse-dot {
            0%,
            100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.85);
            }
        }

        .stream-url-box {
            flex: 1;
            min-width: 200px;
            background: #0f141c;
            padding: 6px 14px;
            border-radius: 30px;
            border: 1px solid #2d3646;
            font-size: 0.8rem;
            color: #9aa3b3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-family: 'Courier New', monospace;
        }

        .btn {
            background: #2d3646;
            border: none;
            color: #e2e8f0;
            padding: 8px 18px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.1s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:hover {
            background: #3d465a;
        }

        .btn:active {
            transform: scale(0.96);
        }

        .btn-primary {
            background: #2563eb;
            color: #fff;
        }

        .btn-primary:hover {
            background: #1d4ed8;
        }

        .btn-danger {
            background: #b91c1c;
            color: #fff;
        }

        .btn-danger:hover {
            background: #991b1b;
        }

        .action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-left: auto;
        }

        /* pesan error / log singkat */
        .log-message {
            margin-top: 12px;
            padding: 8px 14px;
            border-radius: 30px;
            background: #141b26;
            font-size: 0.8rem;
            color: #7f8a9e;
            border-left: 4px solid #2d3646;
            transition: all 0.2s;
        }

        .log-message.error {
            border-left-color: #f87171;
            color: #fca5a5;
        }

        .log-message.success {
            border-left-color: #34d399;
            color: #6ee7b7;
        }

        /* responsive */
        @media (max-width: 600px) {
            .info-panel {
                flex-direction: column;
                align-items: stretch;
            }
            .action-group {
                margin-left: 0;
                justify-content: flex-end;
            }
            .stream-url-box {
                white-space: normal;
            }
        }
    </style>
</head>

<body>

    <div class="player-container">

        <!-- ====== VIDEO ====== -->
        <div class="video-wrapper">
            <video id="videoPlayer" controls playsinline autoplay muted>
                <!-- Browser akan menampilkan pesan ini jika tidak bisa memutar HLS -->
                Your browser does not support HTML5 video or HLS.
            </video>
        </div>

        <!-- ====== PANEL KONTROL & STATUS ====== -->
        <div class="info-panel">
            <div class="status-badge">
                <span class="status-dot" id="statusDot"></span>
                <span id="statusText">Siap</span>
            </div>

            <div class="stream-url-box" id="urlDisplay" title="Klik untuk mengubah URL">
                🔗 https://celinebee.cc.cd/document/sports.m3u
            </div>

            <div class="action-group">
                <button class="btn btn-primary" id="btnLoad">▶ Muat Ulang</button>
                <button class="btn" id="btnChangeUrl">✏️ Ganti URL</button>
            </div>
        </div>

        <!-- ====== LOG / PESAN ====== -->
        <div class="log-message" id="logMessage">
            💡 Siap memutar stream. Klik "Muat Ulang" jika video belum muncul.
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // --- Elemen DOM ---
            const video = document.getElementById('videoPlayer');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const logEl = document.getElementById('logMessage');
            const urlDisplay = document.getElementById('urlDisplay');
            const btnLoad = document.getElementById('btnLoad');
            const btnChangeUrl = document.getElementById('btnChangeUrl');

            // --- State ---
            let currentUrl = 'https://celinebee.cc.cd/document/sports.m3u';
            let hls = null; // instance HLS.js
            let isHlsReady = false;

            // --- Helper update status & log ---
            function setStatus(state, message) {
                // state: 'loading' | 'playing' | 'error' | 'idle'
                statusDot.className = 'status-dot';
                if (state === 'loading') {
                    statusDot.classList.add('loading');
                    statusText.textContent = message || 'Memuat...';
                } else if (state === 'playing') {
                    statusDot.classList.add('playing');
                    statusText.textContent = message || 'Tayang';
                } else if (state === 'error') {
                    statusDot.classList.add('error');
                    statusText.textContent = message || 'Error';
                } else {
                    // idle
                    statusText.textContent = message || 'Siap';
                }
            }

            function setLog(msg, type) {
                // type: 'error' | 'success' | ''
                logEl.textContent = msg;
                logEl.className = 'log-message';
                if (type === 'error') logEl.classList.add('error');
                else if (type === 'success') logEl.classList.add('success');
                // jika tidak ada type, tetap netral
            }

            // --- Bersihkan HLS instance sebelumnya ---
            function destroyHls() {
                if (hls) {
                    hls.destroy();
                    hls = null;
                    isHlsReady = false;
                }
                // Hentikan semua pemutaran native jika ada
                if (!video.paused) video.pause();
                video.removeAttribute('src');
                video.load(); // reset video
            }

            // --- Fungsi utama: muat stream HLS ---
            function loadStream(url) {
                // Validasi sederhana
                if (!url || url.trim() === '') {
                    setStatus('error', 'URL kosong');
                    setLog('❌ URL tidak boleh kosong.', 'error');
                    return;
                }

                // Bersihkan dulu
                destroyHls();

                // Update display URL
                urlDisplay.textContent = '🔗 ' + url;
                currentUrl = url;

                setStatus('loading', 'Menyambung...');
                setLog('⏳ Memuat stream: ' + url, '');

                // Cek apakah browser support MediaSource (HLS.js butuh itu)
                if (!window.MediaSource) {
                    setStatus('error', 'Browser tidak support');
                    setLog('❌ Browser Anda tidak mendukung MediaSource (HLS.js tidak bisa berjalan).', 'error');
                    return;
                }

                // ---- Inisialisasi HLS.js ----
                hls = new Hls({
                    enableWorker: true, // pakai thread pekerja untuk performa
                    lowLatencyMode: true, // cocok untuk live stream
                    // tambahan parameter bila perlu
                });

                // Pasang HLS ke video element
                hls.attachMedia(video);

                // --- Event HLS ---
                hls.on(Hls.Events.MEDIA_ATTACHED, function() {
                    setLog('📡 Media terpasang, memuat playlist...', '');
                    hls.loadSource(url);
                });

                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    isHlsReady = true;
                    setStatus('loading', 'Playlist siap, memutar...');
                    setLog('✅ Manifest HLS berhasil diurai. Memulai pemutaran.', 'success');
                    // Mulai putar otomatis
                    video.play().catch(function(err) {
                        // Autoplay diblokir? biarkan user klik play manual
                        setLog('⚠️ Autoplay tidak diizinkan. Klik tombol play di video.', '');
                        setStatus('idle', 'Klik play');
                    });
                });

                hls.on(Hls.Events.LEVEL_LOADED, function() {
                    // bisa dipakai untuk indikasi kualitas
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    // Jika error fatal, kita tampilkan
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                setStatus('error', 'Error jaringan');
                                setLog('❌ Fatal: Network error. Coba refresh atau periksa koneksi.', 'error');
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                setStatus('error', 'Error media');
                                setLog('❌ Fatal: Media error. Mungkin stream rusak.', 'error');
                                break;
                            default:
                                setStatus('error', 'Error HLS');
                                setLog('❌ Fatal error: ' + data.details, 'error');
                        }
                        // recover dengan reload
                        if (hls) hls.recoverMediaError();
                    } else {
                        // non-fatal, tampilkan warning
                        setLog('⚠️ Non-fatal error: ' + data.details, '');
                    }
                });

                // Ketika video mulai bermain
                video.addEventListener('playing', function onPlaying() {
                    setStatus('playing', 'Tayang');
                    setLog('▶️ Stream sedang berjalan.', 'success');
                });

                // Ketika video pause
                video.addEventListener('pause', function onPause() {
                    if (video.readyState > 0) {
                        setStatus('idle', 'Dijeda');
                        setLog('⏸️ Pemutaran dijeda.', '');
                    }
                });

                // Jika terjadi error pada video element (misal codec)
                video.addEventListener('error', function(e) {
                    const err = video.error;
                    if (err) {
                        setStatus('error', 'Video error');
                        setLog('❌ Video error: code ' + err.code + ' - ' + err.message, 'error');
                    }
                });

                // HLS.js selesai memuat
                hls.on(Hls.Events.LEVEL_SWITCHED, function() {
                    // opsional
                });

                // Jika HLS.js tidak support (misal browser sangat tua), fallback ke native
                // Tapi HLS.js sudah support hampir semua browser modern.
                // Kita bisa tambahkan fallback sederhana: jika Hls.isSupported() false
                if (!Hls.isSupported()) {
                    setStatus('error', 'HLS tidak support');
                    setLog('❌ HLS.js bilang browser ini tidak support HLS.', 'error');
                    destroyHls();
                    return;
                }

                // Karena HLS.js mendukung, kita lanjut.
                // Tapi jika browser sebenarnya support native HLS (Safari) dan kita tetap pakai HLS.js,
                // tidak masalah. Tapi kita bisa memberi opsi native jika mau.
                // Biarkan HLS.js tetap dipakai untuk konsistensi.

                // Set timeout untuk indikasi jika terlalu lama
                // (hanya untuk feedback)
            }

            // --- Ganti URL via prompt ---
            function promptChangeUrl() {
                const newUrl = prompt('Masukkan URL stream HLS (m3u8 / m3u):', currentUrl);
                if (newUrl !== null && newUrl.trim() !== '') {
                    loadStream(newUrl.trim());
                } else if (newUrl !== null) {
                    setLog('⏭️ URL tidak diubah.', '');
                }
            }

            // --- Inisialisasi pertama kali ---
            function init() {
                // Tampilkan URL di panel
                urlDisplay.textContent = '🔗 ' + currentUrl;
                setStatus('idle', 'Siap');
                setLog('💡 Siap memutar. Klik "Muat Ulang" atau tombol play di video.', '');

                // Jika autoplay dengan muted, kita coba load langsung
                // (karena video sudah ada attribute autoplay muted)
                // Tapi lebih baik kita muat stream setelah user klik atau otomatis.
                // Kita muat otomatis dengan sedikit delay agar DOM siap.
                setTimeout(function() {
                    loadStream(currentUrl);
                }, 300);
            }

            // --- Event listeners untuk tombol ---
            btnLoad.addEventListener('click', function() {
                loadStream(currentUrl);
            });

            btnChangeUrl.addEventListener('click', promptChangeUrl);

            // Klik pada URL display juga bisa ganti URL (opsional)
            urlDisplay.addEventListener('click', function() {
                if (window.getSelection().toString() === '') {
                    promptChangeUrl();
                }
            });

            // --- Mulai ---
            init();

            // Cleanup saat halaman ditutup (opsional)
            window.addEventListener('beforeunload', function() {
                if (hls) {
                    hls.destroy();
                    hls = null;
                }
            });

        })();
    </script>
</body>
</html>
