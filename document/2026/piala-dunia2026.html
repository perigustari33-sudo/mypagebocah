<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Pemutar Stream FWC 2026</title>

    <!-- HLS.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

    <style>
        /* Reset & Fullscreen */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0a0a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 16px;
        }

        .player-wrapper {
            width: 100%;
            max-width: 960px;
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
            border: 1px solid #2a2a2a;
        }

        /* Container video - rasio 16:9 */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 */
            background: #000;
            overflow: hidden;
        }

        .video-container video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: block;
        }

        /* Info & Status */
        .info-bar {
            padding: 16px 20px;
            background: #141414;
            border-top: 1px solid #2a2a2a;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: #aaa;
        }

        .status .dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
            transition: background 0.3s;
        }

        .status .dot.loading {
            background: #f0ad4e;
            animation: pulse 1s infinite;
        }

        .status .dot.playing {
            background: #5cb85c;
        }

        .status .dot.error {
            background: #d9534f;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.85); }
        }

        .status-text {
            transition: color 0.3s;
        }

        .url-label {
            font-size: 12px;
            color: #666;
            background: #222;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
            border: 1px solid #333;
            font-family: 'Courier New', monospace;
        }

        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .btn {
            background: #2a2a2a;
            border: none;
            color: #ddd;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #3a3a3a;
        }

        .btn:hover {
            background: #3a3a3a;
            color: #fff;
        }

        .btn-primary {
            background: #007bff;
            border-color: #007bff;
            color: #fff;
        }

        .btn-primary:hover {
            background: #0056b3;
            border-color: #0056b3;
        }

        .btn-danger {
            background: #d9534f;
            border-color: #d9534f;
            color: #fff;
        }

        .btn-danger:hover {
            background: #c9302c;
            border-color: #c9302c;
        }

        /* Responsif */
        @media (max-width: 600px) {
            .info-bar {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }

            .btn-group {
                justify-content: center;
            }

            .url-label {
                max-width: 100%;
                text-align: center;
            }

            .status {
                justify-content: center;
            }
        }
    </style>
</head>
<body>

    <div class="player-wrapper">
        <!-- Video -->
        <div class="video-container">
            <video id="video" controls playsinline></video>
        </div>

        <!-- Control Bar -->
        <div class="info-bar">
            <div class="status">
                <span class="dot" id="statusDot"></span>
                <span class="status-text" id="statusText">Memuat...</span>
            </div>

            <div class="url-label" id="urlDisplay">📡 celinebee.cc.cd</div>

            <div class="btn-group">
                <button class="btn btn-primary" id="btnPlay">▶ Putar</button>
                <button class="btn btn-danger" id="btnStop">⏹ Stop</button>
                <button class="btn" id="btnReload">⟳ Reload</button>
            </div>
        </div>
    </div>

    <script>
        (function() {
            'use strict';

            // ---------- URL STREAM (LANGSUNG DARI ANDA) ----------
            const STREAM_URL = 'https://celinebee.cc.cd/document/sports.m3u';
            // -----------------------------------------------------

            const video = document.getElementById('video');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const urlDisplay = document.getElementById('urlDisplay');

            let hls = null;
            let isPlaying = false;

            // Utility: set status
            function setStatus(type, msg) {
                statusDot.className = 'dot';
                if (type) statusDot.classList.add(type);
                statusText.textContent = msg || '—';
            }

            // Hentikan & bersihkan HLS
            function destroyHls() {
                if (hls) {
                    try {
                        hls.destroy();
                    } catch (_) {}
                    hls = null;
                }
                // Jangan hapus src video agar tetap ada frame terakhir
                isPlaying = false;
            }

            // Load stream menggunakan HLS.js
            function loadStream() {
                // Stop sebelumnya
                destroyHls();

                // Reset video
                video.removeAttribute('src');
                video.load();

                setStatus('loading', 'Memuat stream...');

                // Cek dukungan native HLS (Safari)
                if (video.canPlayType('application/vnd.apple.mpegurl')) {
                    // Native HLS (Safari, iOS)
                    video.src = STREAM_URL;
                    video.play().then(() => {
                        isPlaying = true;
                        setStatus('playing', '▶ Putar (Native HLS)');
                    }).catch((err) => {
                        setStatus('error', 'Gagal main native: ' + err.message);
                        console.error('Native HLS error:', err);
                    });
                    return;
                }

                // Gunakan HLS.js untuk browser lain
                if (!Hls.isSupported()) {
                    setStatus('error', '⚠ Browser tidak mendukung HLS');
                    return;
                }

                hls = new Hls({
                    enableWorker: true,
                    lowLatencyMode: true,
                    backbufferLength: 30,
                    maxBufferLength: 30,
                });

                hls.loadSource(STREAM_URL);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    video.play().then(() => {
                        isPlaying = true;
                        setStatus('playing', '▶ Putar (HLS.js)');
                    }).catch((err) => {
                        setStatus('error', 'Gagal play: ' + err.message);
                        console.warn('Play error:', err);
                    });
                });

                hls.on(Hls.Events.ERROR, function(event, data) {
                    if (data.fatal) {
                        setStatus('error', '⚠ Fatal: ' + (data.details || 'unknown'));
                        console.error('HLS fatal error:', data);
                        // Coba recover
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                hls.recoverMediaError();
                                break;
                            default:
                                destroyHls();
                                setStatus('error', 'Gagal load stream');
                                break;
                        }
                    } else {
                        // Non-fatal
                        setStatus('loading', '⏳ Buffering...');
                        console.warn('HLS non-fatal:', data.details);
                    }
                });

                hls.on(Hls.Events.BUFFER_CREATED, function() {
                    // Buffering mulai
                });

                hls.on(Hls.Events.FRAG_BUFFERED, function() {
                    // Data mulai masuk
                });

                // Timeout jika loading terlalu lama
                const timeout = setTimeout(() => {
                    if (!isPlaying && hls) {
                        setStatus('loading', '⏳ Loading lama, coba ulang...');
                    }
                }, 15000);
                // Clear saat berhasil
                hls.on(Hls.Events.MANIFEST_PARSED, function() {
                    clearTimeout(timeout);
                });
            }

            // Stop stream
            function stopStream() {
                destroyHls();
                // Hentikan video & kosongkan src
                video.pause();
                video.removeAttribute('src');
                video.load();
                isPlaying = false;
                setStatus('', '⏹ Berhenti');
            }

            // Reload (refresh)
            function reloadStream() {
                stopStream();
                // Tunggu sebentar lalu load ulang
                setTimeout(() => {
                    loadStream();
                }, 300);
            }

            // ---------- EVENT LISTENER ----------
            document.getElementById('btnPlay').addEventListener('click', function() {
                // Jika sudah berhenti atau error, load ulang
                if (!isPlaying) {
                    loadStream();
                } else {
                    // Jika sedang pause, resume
                    if (video.paused) {
                        video.play().catch(() => {});
                    }
                }
            });

            document.getElementById('btnStop').addEventListener('click', stopStream);

            document.getElementById('btnReload').addEventListener('click', reloadStream);

            // Tampilkan URL di bar (dipotong)
            urlDisplay.textContent = '📡 ' + STREAM_URL.replace(/^https?:\/\//, '').split('/')[0];

            // Auto-load saat halaman dibuka
            window.addEventListener('load', function() {
                // Tunggu sebentar agar DOM siap
                setTimeout(loadStream, 500);
            });

            // Handle visibility change - jika tab di-hidden, tidak reload otomatis
            document.addEventListener('visibilitychange', function() {
                if (!document.hidden && hls && !isPlaying) {
                    // Jika kembali ke tab dan stream mati, coba reload
                    // Tapi biarkan user yang klik play
                }
            });

            // Jika video error karena network
            video.addEventListener('error', function(e) {
                if (!hls) {
                    setStatus('error', 'Video error: ' + (e.message || 'unknown'));
                }
            });

            console.log('📺 Pemutar HLS siap. URL:', STREAM_URL);
            console.log('🔧 Gunakan tombol Play/Stop/Reload untuk kontrol.');

        })();
    </script>

</body>
</html>
