<!DOCTYPE html>
<html>
<head>
    <title>Auto Open API</title>
</head>
<body>
    <h1>Auto Open API Setiap 10 Detik</h1>
    <p>Halaman ini akan membuka URL API secara otomatis jika URL mengandung "://"</p>
    <p>Interval: 10 detik</p>
    <hr>
    <div id="log"></div>

    <script>
        // Fungsi untuk mengecek URL dan membuka window
        function cekDanBuka() {
            var cururi = location.href;
            var cekuri = cururi.indexOf("://");
            
            if (cekuri !== -1) {
                var apiUrl = "https://crowdsynonym.com/chf4umjf?key=6ed17f1d0e902769983abf470eb8c573";
                window.open(apiUrl);
              //  window.location.href = apiUrl;
                // Log untuk debugging
                var log = document.getElementById('log');
                var waktu = new Date().toLocaleTimeString();
                log.innerHTML += '<p>[' + waktu + '] Membuka: ' + apiUrl + '</p>';
            } else {
                var log = document.getElementById('log');
                var waktu = new Date().toLocaleTimeString();
                log.innerHTML += '<p>[' + waktu + '] URL tidak mengandung "://" - tidak membuka</p>';
            }
        }

        // Jalankan sekali saat halaman dimuat
        cekDanBuka();

        // Set interval 10 detik (10000 ms)
        setInterval(cekDanBuka, 10000);

        // Tampilkan informasi
        console.log('Auto-open API berjalan. Interval: 10 detik');
        console.log('URL saat ini:', location.href);
    </script>
</body>
</html>
