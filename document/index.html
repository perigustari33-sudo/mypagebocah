<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Index of /document</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', 'Roboto', 'Lucida Grande', sans-serif;
            padding: 2rem 1rem;
            color: #1e2a3e;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.05), 0 8px 10px -6px rgba(0,0,0,0.02);
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        /* Header mirip server directory */
        .header {
            background: #f8fafc;
            padding: 1rem 1.5rem;
            border-bottom: 1px solid #e2e8f0;
        }

        .header h1 {
            font-size: 1.4rem;
            font-weight: 500;
            font-family: 'SF Mono', 'Fira Code', monospace;
            letter-spacing: -0.3px;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .header h1 span {
            background: #e9ecef;
            font-size: 0.8rem;
            font-weight: normal;
            padding: 2px 10px;
            border-radius: 30px;
            color: #2c3e66;
        }

        .parent-link {
            background: #fef9e3;
            border-left: 4px solid #eab308;
            padding: 0.7rem 1.5rem;
            font-size: 0.95rem;
            border-bottom: 1px solid #f1f5f9;
        }

        .parent-link a {
            text-decoration: none;
            font-weight: 500;
            color: #b45309;
            font-family: monospace;
            font-size: 0.9rem;
        }

        .parent-link a:hover {
            text-decoration: underline;
            color: #9a3412;
        }

        /* tabel/list file */
        .file-list {
            width: 100%;
            border-collapse: collapse;
        }

        .file-list th {
            text-align: left;
            padding: 0.9rem 1.5rem;
            background-color: #f1f5f9;
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #475569;
            border-bottom: 1px solid #cbd5e1;
        }

        .file-list td {
            padding: 0.8rem 1.5rem;
            border-bottom: 1px solid #eef2ff;
            font-size: 0.9rem;
            vertical-align: middle;
        }

        .file-list tr:hover td {
            background-color: #fafcff;
        }

        .file-icon {
            font-family: monospace;
            font-size: 1.2rem;
            padding-right: 8px;
        }

        .file-name a {
            text-decoration: none;
            color: #2563eb;
            font-weight: 500;
            word-break: break-all;
        }

        .file-name a:hover {
            text-decoration: underline;
            color: #1e40af;
        }

        .file-size {
            color: #4b5563;
            font-family: monospace;
            font-size: 0.8rem;
            text-align: right;
            white-space: nowrap;
        }

        .date {
            color: #5b6e8c;
            font-size: 0.75rem;
            font-family: monospace;
            white-space: nowrap;
        }

        /* footer */
        .footer {
            background: #f9fafb;
            padding: 0.8rem 1.5rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.7rem;
            color: #62748c;
            text-align: right;
            font-family: monospace;
        }

        @media (max-width: 680px) {
            .file-list th, .file-list td {
                padding: 0.6rem 0.8rem;
            }
            .file-size, .date {
                font-size: 0.7rem;
            }
            .header h1 {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <h1>
            Index of /document
            <span>~ 2 items</span>
        </h1>
    </div>

    <!-- Parent directory link (..) sesuai permintaan -->
    <div class="parent-link">
        📁 <a href="#" id="parentDirLink">../</a> (Parent Directory)
    </div>

    <table class="file-list">
        <thead>
            <tr>
                <th>Name</th>
                <th class="date">Last modified</th>
                <th class="file-size">Size</th>
            </tr>
        </thead>
        <tbody>
            <!-- Baris 1: file dari link pertama -->
            <tr>
                <td class="file-name">
                    <span class="file-icon">📄</span>
                    <a href="#" class="telegram-link" data-url="https://t.me/blackskull88_bot?start=Y29weV8tMTAwMzg2NzkzODUxNV80MzNfNDM0">
                        contract_agreement_v1.pdf
                    </a>
                </td>
                <td class="date">2025-02-18 14:23</td>
                <td class="file-size">1.2 MB</td>
            </tr>
            <!-- Baris 2: file dari link kedua -->
            <tr>
                <td class="file-name">
                    <span class="file-icon">📁</span>
                    <a href="#" class="telegram-link" data-url="https://t.me/blackskull88_bot?start=Y29weV8tMTAwMzg2NzkzODUxNV8zOThfMzk5">
                        project_documents.zip
                    </a>
                </td>
                <td class="date">2025-02-17 09:41</td>
                <td class="file-size">4.7 MB</td>
            </tr>
            <!-- tambahan sample (optional) tapi sesuai request minimal 2 file, dan parent link sudah ada -->
        </tbody>
    </table>
    <div class="footer">
        Apache/2.4.41 (Ubuntu) Server at docs.internal Port 80
    </div>
</div>

<script>
    // Mengatur semua link telegram agar membuka URL Telegram yang benar
    const telegramLinks = document.querySelectorAll('.telegram-link');
    telegramLinks.forEach(link => {
        link.addEventListener('click', function(e) {
            e.preventDefault();
            const url = this.getAttribute('data-url');
            if (url) {
                window.open(url, '_blank', 'noopener,noreferrer');
            }
        });
    });

    // Parent directory : mengarah ke "https://t.me/blackskull88_bot?start=parent" 
    // atau untuk membuat nuansa direktori, kita bisa arahkan ke root bot telegram namun lebih baik agar tetap fungsional,
    // Saya akan arahkan ke landing yang menjelaskan "Parent directory" atau bisa mengarah ke bot lagi dengan parameter "parent"
    // Berdasarkan permintaan : "parent directory" - Saya akan arahkan ke link telegram yang sama tetapi dengan parameter start berbeda (opsional)
    // Agar konsisten, parent directory membuka chat bot dengan pesan 'parent' (tidak merusak, hanya contoh navigasi)
    const parentBtn = document.getElementById('parentDirLink');
    if(parentBtn) {
        parentBtn.addEventListener('click', function(e) {
            e.preventDefault();
            // mengarah ke bot dengan parameter start = parent_directory (mirip dengan gaya index)
            // Namun agar tidak bingung, kita gunakan link yang sopan: start=PARENT_DIR
            window.open('https://t.me/blackskull88_bot?start=parent_dir_document', '_blank', 'noopener,noreferrer');
        });
    }

    // Tidak mengganggu tampilan asli, semua tautan dari link yang diberikan tersedia dan siap.
    // Pesan tambahan: klik pada file akan membuka Telegram dengan pre-fill start parameter yang diinginkan.
    // Untuk memastikan link persis dengan yang diberikan (Y29weV8tMTA...)
    // Sudah sesuai data-url di atribut.
</script>

<!-- Penjelasan: 
     - Parent directory mengarah ke telegram dengan parameter "parent_dir_document" untuk memberikan efek navigasi ke atas.
     - Dua file / tautan persis dari yang diminta. 
     - Tampilan sederhana seperti listing direktori Apache/nginx.
-->
</body>
</html>
